name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Compile active entrypoints
        run: uv run python -m py_compile workbench_app.py scripts/workbench_app.py scripts/app.py scripts/answer.py scripts/ingest.py tests/test_smoke.py evaluation/eval.py

      - name: Run tests
        run: uv run pytest -q
